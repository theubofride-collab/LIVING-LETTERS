spring:
  datasource:
    url: jdbc:h2:mem:livinglettersdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

frontend:
  url: http://localhost:3000

# Cloudinary (optional in dev - upload endpoint will return error if not configured)
# Set CLOUDINARY_URL env var to enable: cloudinary://api_key:api_secret@cloud_name
