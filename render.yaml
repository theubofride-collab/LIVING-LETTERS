services:
  # ---- Backend (Spring Boot) ----
  - type: web
    name: living-letters-api
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION
        value: "900000"
      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"
      - key: FRONTEND_URL
        value: "https://living-letters-web.onrender.com"
      - key: CLOUDINARY_URL
        value: ""
      # DATABASE_URL must be set manually in Render dashboard
      # Copy the EXTERNAL Database URL from your database page on Render
      # It should look like: postgresql://user:pass@host.frankfurt-postgres.render.com:5432/livingletters
    healthCheckPath: /api/v1/categories

  # ---- Frontend (Next.js) ----
  - type: web
    name: living-letters-web
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: Dockerfile
    buildArgs:
      - name: NEXT_PUBLIC_API_URL
        value: "https://living-letters-api.onrender.com/api"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://living-letters-api.onrender.com/api"

databases:
  - name: living-letters-db
    plan: free
    databaseName: livingletters
    ipAllowList:
      - name: all
        cidr: 0.0.0.0/0
