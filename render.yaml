services:
  # ---- Backend (Spring Boot) ----
  - type: web
    name: living-letters-api
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: living-letters-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION
        value: "900000"
      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"
      - key: FRONTEND_URL
        value: "https://living-letters-web.onrender.com"
      - key: CLOUDINARY_URL
        sync: false
        value: ""
      - key: JAVA_VERSION
        value: "17"
    healthCheckPath: /api/v1/categories

  # ---- Frontend (Next.js) ----
  - type: web
    name: living-letters-web
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://living-letters-api.onrender.com/api"

databases:
  - name: living-letters-db
    plan: free
    databaseName: livingletters
    ipAllowList: []
